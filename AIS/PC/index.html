<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AIS Live Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080f1a;
      --bg2:      #0c1624;
      --bg3:      #101e30;
      --border:   #1a2d42;
      --accent:   #00d4ff;
      --accent2:  #00ff9d;
      --warn:     #ffaa00;
      --danger:   #ff4455;
      --text:     #c8dce8;
      --muted:    #4a6070;
      --font-ui:  'Syne', sans-serif;
      --font-mono:'JetBrains Mono', monospace;
    }

    body {
      display: flex; height: 100vh;
      font-family: var(--font-mono);
      background: var(--bg); color: var(--text);
      overflow: hidden;
    }

    #sidebar {
      width: 300px; min-width: 300px; height: 100vh;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }

    #sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
    #sidebar-header h1 {
      font-family: var(--font-ui); font-size: 15px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase;
    }
    #ws-status { font-size: 10px; color: var(--muted); margin-top: 3px; display: block; }
    #ws-status.ok { color: var(--accent2); }

    #export-panel {
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg3);
    }
    #export-panel h2, #recorder h2 {
      font-family: var(--font-ui); font-size: 10px; font-weight: 700;
      color: var(--muted); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .export-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .export-row label { font-size: 10px; color: var(--muted); min-width: 42px; }
    select, input[type=number] {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 4px;
      padding: 4px 6px; font-size: 11px;
      font-family: var(--font-mono); flex: 1;
    }
    select:focus, input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }

    .btn-row { display: flex; gap: 6px; margin-top: 6px; }
    .btn {
      flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
      background: var(--bg); color: var(--text); font-family: var(--font-mono);
      font-size: 11px; cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.05); }
    .btn.primary { border-color: var(--accent2); color: var(--accent2); }
    .btn.primary:hover { background: rgba(0,255,157,0.08); }
    .btn.danger { border-color: var(--danger); color: var(--danger); }
    .btn.danger:hover { background: rgba(255,68,85,0.08); }

    #recorder { padding: 10px 16px; border-bottom: 1px solid var(--border); }
    #rec-btn {
      width: 100%; padding: 7px; border: 1px solid var(--accent2); border-radius: 4px;
      background: rgba(0,255,157,0.06); color: var(--accent2);
      font-family: var(--font-mono); font-size: 11px; cursor: pointer; transition: all 0.2s;
    }
    #rec-btn.recording {
      border-color: var(--danger); color: var(--danger);
      background: rgba(255,68,85,0.06);
      animation: pulse-border 1.5s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,68,85,0.3); }
      50%      { box-shadow: 0 0 0 4px rgba(255,68,85,0); }
    }
    #rec-progress { height: 2px; background: var(--border); border-radius: 1px; margin-top: 6px; }
    #rec-bar { height: 100%; width: 0%; background: var(--accent2); border-radius: 1px; transition: width 0.5s; }
    #rec-status { font-size: 10px; color: var(--muted); margin-top: 4px; min-height: 13px; }

    #ship-list { overflow-y: auto; flex: 1; }
    #ship-list::-webkit-scrollbar { width: 4px; }
    #ship-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .ship-item {
      padding: 8px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s; border-left: 2px solid transparent;
    }
    .ship-item:hover { background: var(--bg3); }
    .ship-item.active { background: var(--bg3); border-left-color: var(--accent); }
    .ship-item.tracking { border-left-color: var(--accent2); }
    .ship-item.timed-out { opacity: 0.45; }

    .ship-name {
      font-family: var(--font-ui); font-size: 12px; font-weight: 700;
      color: #eef; display: flex; align-items: center; gap: 6px;
    }
    .ship-name.unknown { color: var(--muted); font-weight: 400; font-style: italic; }
    .ship-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .ship-mmsi   { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .ship-coords { font-size: 10px; color: #5a9a7a; margin-top: 1px; }
    .ship-speed  { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .no-pos { color: #3a4a50; }

    #status-bar {
      padding: 7px 16px; border-top: 1px solid var(--border);
      font-size: 10px; color: var(--muted);
      display: flex; justify-content: space-between;
    }
    #status-bar span { color: var(--accent); }

    #track-info {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--bg2); border: 1px solid var(--accent);
      border-radius: 6px; padding: 12px 16px; font-size: 11px;
      z-index: 1000; min-width: 220px; display: none;
      box-shadow: 0 0 20px rgba(0,212,255,0.15);
    }
    #track-info h3 { font-family: var(--font-ui); font-size: 13px; color: var(--accent); margin-bottom: 6px; }
    #track-info .meta { color: var(--muted); margin-top: 2px; }
    #track-close { position: absolute; top: 8px; right: 10px; cursor: pointer; color: var(--muted); font-size: 14px; }
    #track-close:hover { color: var(--danger); }

    #map { flex: 1; height: 100vh; }

    .leaflet-popup-content-wrapper {
      background: var(--bg2) !important; border: 1px solid var(--border) !important;
      color: var(--text) !important; font-family: var(--font-mono) !important;
      font-size: 11px !important; border-radius: 6px !important;
      box-shadow: 0 0 16px rgba(0,212,255,0.1) !important;
    }
    .leaflet-popup-content { margin: 12px 14px !important; }
    .leaflet-popup-tip { background: var(--bg2) !important; }
    .popup-name { font-family: var(--font-ui); font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .popup-row { display: flex; justify-content: space-between; gap: 16px; margin-top: 4px; }
    .popup-label { color: var(--muted); }
    .popup-val { color: var(--text); }
    .popup-lastseen { color: var(--accent2); }
    .popup-lastseen.stale { color: var(--warn); }
    .popup-lastseen.timedout { color: var(--danger); }
    .popup-track-btn {
      margin-top: 10px; width: 100%; padding: 6px;
      border: 1px solid var(--accent2); border-radius: 3px;
      background: rgba(0,255,157,0.06); color: var(--accent2);
      font-family: var(--font-mono); font-size: 10px; cursor: pointer;
    }
    .popup-track-btn:hover { background: rgba(0,255,157,0.12); }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>AIS Tracker</h1>
    <span id="ws-status">Connecting...</span>
  </div>

  <div id="export-panel">
    <h2>Export History</h2>
    <div class="export-row">
      <label>Period</label>
      <select id="exp-period">
        <option value="1h">Last 1 hour</option>
        <option value="3h">Last 3 hours</option>
        <option value="6h">Last 6 hours</option>
        <option value="12h">Last 12 hours</option>
        <option value="24h" selected>Last 24 hours</option>
        <option value="3d">Last 3 days</option>
        <option value="7d">Last 7 days</option>
        <option value="14d">Last 14 days</option>
      </select>
    </div>
    <div class="export-row">
      <label>Format</label>
      <select id="exp-format">
        <option value="csv">CSV</option>
        <option value="json">JSON</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="exportAll()">↓ Export All</button>
      <button class="btn" onclick="exportSelected()" id="exp-sel-btn" disabled>↓ Selected</button>
    </div>
  </div>

  <div id="recorder">
    <h2>Live Recorder</h2>
    <div class="export-row">
      <label>Duration</label>
      <input type="number" id="rec-duration" value="5" min="1" max="1440" style="width:50px;flex:none">
      <select id="rec-unit">
        <option value="60">min</option>
        <option value="3600">hrs</option>
        <option value="1">sec</option>
      </select>
    </div>
    <button id="rec-btn" onclick="toggleRecording()">⏺ Start Recording</button>
    <div id="rec-progress"><div id="rec-bar"></div></div>
    <div id="rec-status"></div>
  </div>

  <div id="ship-list"></div>

  <div id="status-bar">
    <span id="count">0</span> visible &nbsp;|&nbsp; <span id="total-count">0</span> total
  </div>
</div>

<div id="track-info">
  <span id="track-close" onclick="clearTrack()">✕</span>
  <h3 id="track-name">—</h3>
  <div class="meta" id="track-points">—</div>
  <div class="meta" id="track-range">—</div>
  <button class="btn danger" style="width:100%;margin-top:8px" onclick="clearTrack()">Clear Track</button>
</div>

<div id="map"></div>

<script>
  const TIMEOUT_MS = 10 * 60 * 1000; // 10 minutes

  const map = L.map('map').setView([54.36, 18.66], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18, attribution: '© OpenStreetMap'
  }).addTo(map);
  L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
    maxZoom: 18, opacity: 0.7, attribution: '© OpenSeaMap'
  }).addTo(map);

  const ships  = {};
  const trails = {};
  let selectedMmsi = null;
  let trackLayer   = null;
  let trackMmsi    = null;

  function getColor(type) {
    if (type >= 60 && type <= 69) return '#ffaa00';
    if (type >= 70 && type <= 79) return '#00d4ff';
    if (type >= 80 && type <= 89) return '#ff4455';
    return '#00ff9d';
  }

  function shipIcon(course, color, isSelected) {
    const size = isSelected ? 26 : 20;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="-13 -13 26 26">
      <polygon points="0,-10 6,8 0,5 -6,8" fill="${color}" stroke="#080f1a" stroke-width="1"
        transform="rotate(${course || 0})" opacity="${isSelected ? 1 : 0.85}"/>
      ${isSelected ? `<circle cx="0" cy="0" r="12" fill="none" stroke="${color}" stroke-width="0.8" opacity="0.4"/>` : ''}
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [size, size], iconAnchor: [size/2, size/2] });
  }

  function formatCoord(v, pos, neg) {
    if (v == null) return '—';
    return `${Math.abs(v).toFixed(4)}°${v >= 0 ? pos : neg}`;
  }

  function timeSince(ms) {
    if (!ms) return '—';
    const sec = Math.floor((Date.now() - ms) / 1000);
    if (sec < 60)   return `${sec}s ago`;
    if (sec < 3600) return `${Math.floor(sec / 60)}m ago`;
    return `${Math.floor(sec / 3600)}h ago`;
  }

  function isTimedOut(s) {
    // timed out = has a real lastSeen AND it's older than 10min
    return s.lastSeen && (Date.now() - s.lastSeen) > TIMEOUT_MS;
  }

  function isStale(ms) {
    return ms && (Date.now() - ms) > 60000;
  }

  function buildPopup(mmsi) {
    const s = ships[mmsi];
    if (!s) return '';
    const timedOut = isTimedOut(s);
    const stale    = isStale(s.lastSeen);
    const cls      = timedOut ? 'timedout' : stale ? 'stale' : '';
    return `
      <div class="popup-name">${s.name || 'Unknown vessel'}</div>
      <div class="popup-row"><span class="popup-label">MMSI</span><span class="popup-val">${mmsi}</span></div>
      <div class="popup-row"><span class="popup-label">Speed</span><span class="popup-val">${s.speed?.toFixed(1) ?? '—'} kn</span></div>
      <div class="popup-row"><span class="popup-label">Course</span><span class="popup-val">${s.course?.toFixed(0) ?? '—'}°</span></div>
      <div class="popup-row"><span class="popup-label">Type</span><span class="popup-val">${s.type || '—'}</span></div>
      <div class="popup-row">
        <span class="popup-label">Last rx</span>
        <span class="popup-val popup-lastseen ${cls}" id="lastseen-${mmsi}">
          ${timeSince(s.lastSeen)}
        </span>
      </div>
      ${timedOut ? '<div style="color:var(--danger);font-size:10px;margin-top:6px">⚠ Off map — no signal >10min</div>' : ''}
      <button class="popup-track-btn" onclick="loadTrack('${mmsi}','${(s.name||'').replace(/'/g,"\\'")}')">
        ◉ Show full track (24h)
      </button>`;
  }

  // Hide or show marker based on timeout
  function syncMarkerVisibility(mmsi) {
    const s = ships[mmsi];
    if (!s || !s.marker) return;
    if (isTimedOut(s)) {
      if (map.hasLayer(s.marker))    map.removeLayer(s.marker);
      if (map.hasLayer(s.polyline))  map.removeLayer(s.polyline);
    } else {
      if (!map.hasLayer(s.marker))   s.marker.addTo(map);
      if (!map.hasLayer(s.polyline)) s.polyline.addTo(map);
    }
  }

  async function loadTrack(mmsi, name) {
    try {
      const res  = await fetch(`/track/${mmsi}?hours=24`);
      const data = await res.json();
      if (trackLayer) { map.removeLayer(trackLayer); trackLayer = null; }
      trackMmsi = mmsi;

      document.getElementById('track-info').style.display = 'block';
      document.getElementById('track-name').textContent = name || `MMSI ${mmsi}`;

      if (data.length < 2) {
        document.getElementById('track-points').textContent = `${data.length} position(s) — not enough for track`;
        document.getElementById('track-range').textContent = '';
        renderList(); return;
      }

      const latlngs = data.map(p => [p.lat, p.lon]);
      const color   = getColor(ships[mmsi]?.type || 0);
      const segs    = [];
      for (let i = 1; i < latlngs.length; i++) {
        const alpha = 0.15 + 0.85 * (i / latlngs.length);
        segs.push(L.polyline([latlngs[i-1], latlngs[i]], { color, weight: 2.5, opacity: alpha }));
      }
      const mkStart = L.divIcon({
        html: `<div style="width:8px;height:8px;border-radius:50%;background:#4a6070;border:1px solid #080f1a"></div>`,
        className: '', iconSize: [8,8], iconAnchor: [4,4]
      });
      const mkEnd = L.divIcon({
        html: `<div style="width:10px;height:10px;border-radius:50%;background:${color};border:2px solid #080f1a"></div>`,
        className: '', iconSize: [10,10], iconAnchor: [5,5]
      });
      trackLayer = L.layerGroup([
        ...segs,
        L.marker(latlngs[0], { icon: mkStart }),
        L.marker(latlngs[latlngs.length-1], { icon: mkEnd })
      ]).addTo(map);

      document.getElementById('track-points').textContent = `${data.length} positions recorded`;
      const t0 = new Date(data[0].ts).toLocaleTimeString();
      const t1 = new Date(data[data.length-1].ts).toLocaleTimeString();
      document.getElementById('track-range').textContent = `${t0} → ${t1}`;
      map.fitBounds(L.polyline(latlngs).getBounds(), { padding: [40, 40] });
      renderList();
    } catch(e) { console.error('Track load failed:', e); }
  }

  function clearTrack() {
    if (trackLayer) { map.removeLayer(trackLayer); trackLayer = null; }
    trackMmsi = null;
    document.getElementById('track-info').style.display = 'none';
    renderList();
  }

  function renderList() {
    const entries = Object.values(ships).sort((a, b) => {
      // timed-out ships go to bottom
      const aOut = isTimedOut(a), bOut = isTimedOut(b);
      if (aOut && !bOut) return 1;
      if (!aOut && bOut) return -1;
      if (a.name && !b.name) return -1;
      if (!a.name && b.name) return 1;
      return (a.name || '').localeCompare(b.name || '');
    });

    const visible = entries.filter(s => !isTimedOut(s));
    document.getElementById('count').textContent = visible.length;
    document.getElementById('total-count').textContent = entries.length;

    document.getElementById('ship-list').innerHTML = entries.map(s => {
      const color    = getColor(s.type);
      const hasPos   = s.lat != null && s.lon != null;
      const timedOut = isTimedOut(s);
      const stale    = isStale(s.lastSeen);
      const timeColor = timedOut ? 'var(--danger)' : stale ? 'var(--warn)' : 'var(--accent2)';
      return `<div class="ship-item
                ${s.mmsi === selectedMmsi ? 'active' : ''}
                ${s.mmsi === trackMmsi ? 'tracking' : ''}
                ${timedOut ? 'timed-out' : ''}"
                onclick="selectShip('${s.mmsi}')">
        <div class="ship-name ${s.name ? '' : 'unknown'}">
          <span class="ship-dot" style="background:${color};opacity:${timedOut ? 0.3 : stale ? 0.6 : 1}"></span>
          ${s.name || 'Unknown'}
          ${s.mmsi === trackMmsi ? '<span style="color:var(--accent2);font-size:9px;margin-left:4px">◉ TRACK</span>' : ''}
          ${timedOut ? '<span style="color:var(--danger);font-size:9px;margin-left:4px">LOST</span>' : ''}
        </div>
        <div class="ship-mmsi">MMSI: ${s.mmsi} &nbsp;·&nbsp;
          <span style="color:${timeColor}">${timeSince(s.lastSeen)}</span>
        </div>
        <div class="ship-coords ${hasPos ? '' : 'no-pos'}">
          ${hasPos ? `${formatCoord(s.lat,'N','S')} ${formatCoord(s.lon,'E','W')}` : 'No position fix'}
        </div>
        ${s.speed != null ? `<div class="ship-speed">${s.speed.toFixed(1)} kn · ${(s.course||0).toFixed(0)}°</div>` : ''}
      </div>`;
    }).join('');
  }

  function selectShip(mmsi) {
    selectedMmsi = mmsi;
    const s = ships[mmsi];
    if (s && s.lat && s.lon && !isTimedOut(s)) {
      map.setView([s.lat, s.lon], 15);
      if (s.marker) s.marker.openPopup();
    }
    document.getElementById('exp-sel-btn').disabled = false;
    renderList();
  }

  function update(d) {
    const key = d.mmsi;
    if (!ships[key]) {
      ships[key] = { mmsi: d.mmsi, name: d.name || '', type: d.type,
                     lat: null, lon: null, speed: null, course: null, lastSeen: null };
    }
    if (d.name)           ships[key].name   = d.name;
    if (d.type)           ships[key].type   = d.type;
    if (d.speed  != null) ships[key].speed  = d.speed;
    if (d.course != null) ships[key].course = d.course;

    // historic ships get lastSeen from DB timestamp, live ships get now
    if (d.historic && d.ts) {
      const dbTime = new Date(d.ts).getTime();
      if (!isNaN(dbTime)) ships[key].lastSeen = dbTime;
    } else if (!d.historic) {
      ships[key].lastSeen = Date.now();
    }

    if (d.lat && d.lon) {
      ships[key].lat = d.lat;
      ships[key].lon = d.lon;

      const color    = getColor(d.type);
      const isSel    = key === selectedMmsi;
      const timedOut = isTimedOut(ships[key]);

      if (!trails[key]) trails[key] = [];
      if (!d.historic) {
        trails[key].push([d.lat, d.lon]);
        if (trails[key].length > 80) trails[key].shift();
      }

      if (ships[key].marker) {
        ships[key].marker.setLatLng([d.lat, d.lon]);
        ships[key].marker.setIcon(shipIcon(d.course, color, isSel));
        if (ships[key].marker.isPopupOpen()) {
          ships[key].marker.getPopup().setContent(buildPopup(key));
        }
        if (!d.historic) ships[key].polyline.setLatLngs(trails[key]);
      } else {
        ships[key].marker = L.marker([d.lat, d.lon], { icon: shipIcon(d.course, color, isSel) })
          .bindPopup(buildPopup(key), { maxWidth: 230 });
        ships[key].polyline = L.polyline(trails[key], { color, weight: 1, opacity: 0.3 });
        ships[key].marker.on('click', () => {
          selectedMmsi = key;
          document.getElementById('exp-sel-btn').disabled = false;
          ships[key].marker.getPopup().setContent(buildPopup(key));
          renderList();
        });
      }

      // add/remove from map based on timeout
      syncMarkerVisibility(key);
    }

    if (recording && !d.historic) {
      recordedRows.push({
        ts: d.ts, mmsi: d.mmsi, name: ships[key].name,
        lat: d.lat ?? null, lon: d.lon ?? null,
        speed: d.speed ?? null, course: d.course ?? null, type: d.type ?? null
      });
    }
    renderList();
  }

  // WebSocket — auto wss:// on https (Cloudflare), ws:// on http (local)
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => {
      document.getElementById('ws-status').textContent = 'Connected ✓';
      document.getElementById('ws-status').className = 'ok';
    };
    ws.onclose = () => {
      document.getElementById('ws-status').textContent = 'Reconnecting...';
      document.getElementById('ws-status').className = '';
      setTimeout(connect, 3000);
    };
    ws.onmessage = e => update(JSON.parse(e.data));
  }
  connect();

  // Tick every 10s — update timers and sync marker visibility
  setInterval(() => {
    Object.keys(ships).forEach(mmsi => {
      syncMarkerVisibility(mmsi);
      const el = document.getElementById(`lastseen-${mmsi}`);
      if (el) {
        const s   = ships[mmsi];
        const out = isTimedOut(s);
        const stl = isStale(s.lastSeen);
        el.textContent = timeSince(s.lastSeen);
        el.className = `popup-val popup-lastseen ${out ? 'timedout' : stl ? 'stale' : ''}`;
      }
    });
    renderList();
  }, 10000);

  // Fast tick — update last-seen text in open popups
  setInterval(() => {
    Object.keys(ships).forEach(mmsi => {
      const el = document.getElementById(`lastseen-${mmsi}`);
      if (el) el.textContent = timeSince(ships[mmsi].lastSeen);
    });
  }, 1000);

  function exportAll() {
    const period = document.getElementById('exp-period').value;
    const fmt    = document.getElementById('exp-format').value;
    window.location.href = `/export?period=${period}&format=${fmt}`;
  }

  function exportSelected() {
    if (!selectedMmsi) return;
    const period = document.getElementById('exp-period').value;
    const fmt    = document.getElementById('exp-format').value;
    window.location.href = `/export?period=${period}&format=${fmt}&mmsi=${selectedMmsi}`;
  }

  let recording    = false;
  let recordedRows = [];
  let recTimer     = null;
  let recInterval  = null;
  let recEndTime   = null;

  function escapeCSV(v) {
    if (v == null || v === '') return '';
    const s = String(v);
    return s.includes(',') || s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s;
  }

  function toggleRecording() { recording ? stopRecording() : startRecording(); }

  function startRecording() {
    const duration = parseInt(document.getElementById('rec-duration').value) || 5;
    const unit     = parseInt(document.getElementById('rec-unit').value);
    const totalMs  = duration * unit * 1000;
    recordedRows = []; recording = true; recEndTime = Date.now() + totalMs;
    document.getElementById('rec-btn').textContent = '⏹ Stop & Download';
    document.getElementById('rec-btn').classList.add('recording');
    recInterval = setInterval(() => {
      const rem = Math.max(0, recEndTime - Date.now());
      document.getElementById('rec-bar').style.width = ((totalMs - rem) / totalMs * 100).toFixed(1) + '%';
      document.getElementById('rec-status').textContent = `${recordedRows.length} rows · ${Math.ceil(rem/1000)}s left`;
    }, 500);
    recTimer = setTimeout(stopRecording, totalMs);
  }

  function stopRecording() {
    recording = false;
    clearTimeout(recTimer); clearInterval(recInterval);
    document.getElementById('rec-btn').textContent = '⏺ Start Recording';
    document.getElementById('rec-btn').classList.remove('recording');
    document.getElementById('rec-bar').style.width = '100%';
    document.getElementById('rec-status').textContent = `Saved ${recordedRows.length} rows`;
    if (recordedRows.length > 0) {
      const header = 'timestamp,mmsi,name,lat,lon,speed_kn,course_deg,ship_type';
      const body = recordedRows.map(r =>
        [r.ts,r.mmsi,r.name,r.lat,r.lon,r.speed,r.course,r.type].map(escapeCSV).join(',')
      ).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([header+'\n'+body], { type: 'text/csv' }));
      a.download = `ais_live_${new Date().toISOString().slice(0,19).replace(/[:.]/g,'-')}.csv`;
      a.click();
    }
    setTimeout(() => {
      document.getElementById('rec-bar').style.width = '0%';
      document.getElementById('rec-status').textContent = '';
    }, 4000);
  }
</script>
</body>
</html>
